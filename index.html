<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Isaeva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0b0b14;
      color: #d9d9ff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 80px;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 700;
      margin: 0 0 0.2em;
      letter-spacing: -0.04em;
      color: #ffffff;
    }

    .tag {
      font-size: 1.9rem;
      font-weight: 600;
      color: #c9b8ff;
      margin-bottom: 0.4em;
    }

    .sub {
      font-size: 1.25rem;
      color: #a0a0cc;
      max-width: 620px;
      margin: 0 auto;
    }

    .card {
      background: #12121e;
      border: 1px solid #2a2344;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      padding: 48px 36px;
      transition: border-color 0.25s ease;
    }

    .card:hover {
      border-color: #7a5af5;
    }

    .plan-title {
      font-size: 2.1rem;
      font-weight: 700;
      margin-bottom: 0.6em;
      color: #e0e0ff;
    }

    .price-box {
      margin-bottom: 2.2em;
    }

    .price {
      font-size: 4.2rem;
      font-weight: 700;
      color: #b089ff;
      line-height: 1;
      display: inline-block;
    }

    .period {
      font-size: 1.3rem;
      color: #b0b0e0;
      display: block;
      margin-top: 0.2em;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0 0 2.8em;
      text-align: left;
    }

    li {
      font-size: 1.1rem;
      margin: 1em 0;
      color: #d0d0ff;
    }

    li:before {
      content: "•";
      color: #9f7aea;
      margin-right: 0.6em;
      font-size: 1.4rem;
      line-height: 0;
      vertical-align: middle;
    }

    .buy-btn {
      display: block;
      width: 100%;
      padding: 18px;
      background: #6d48e5;
      color: white;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      border-radius: 10px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .buy-btn:hover {
      background: #7c55f0;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 100px;
      color: #606080;
      font-size: 0.9rem;
      text-align: center;
    }

    @media (max-width: 500px) {
      h1 { font-size: 3rem; }
      .tag { font-size: 1.6rem; }
      .price { font-size: 3.4rem; }
      .card { padding: 40px 28px; }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <header>
      <h1>Your Executor</h1>
      <div class="tag">Unleash Power. Stay Invisible.</div>
      <p class="sub">Stable. Fast. Undetectable. Full access starting now.</p>
    </header>

    <div class="card">
      <div class="plan-title">Amateur</div>

      <div class="price-box">
        <div class="price">$4.99</div>
        <div class="period">per week</div>
      </div>

      <ul>
        <li>Supports every feature</li>
        <li>Premium performance</li>
        <li>Fast execution speed</li>
        <li>Minimal injection speed</li>
        <li>Clients Manager</li>
      </ul>

      <a href="https://hotdogkeyz.mysellauth.com/product/isaeva" class="buy-btn">Purchase</a>
    </div>

  </div>

  <footer>© 2026 Isaeva — All rights reserved.</footer>

</body>
</html>
